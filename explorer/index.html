<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pxsl's archive ~ explorer</title>
</head>
<body>

<h1 id="path">Index of /</h1>
<hr>
<div id="files"></div>
<hr>

<script>
const USER = "PxslGames";
const REPO = "archive";
const BRANCH = "main";

async function openDir(path = "") {
    const api = `https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}`;

    const res = await fetch(api);
    const data = await res.json();

    const filesDiv = document.getElementById("files");
    const pathTitle = document.getElementById("path");

    pathTitle.textContent = `Index of /${path}`;

    filesDiv.innerHTML = "";

    if (path !== "") {
        const up = document.createElement("a");

        let split = path.split("/");
        split.pop();

        const parent = split.join("/");

        up.href = "#";
        up.textContent = "../";
        up.onclick = (e) => {
            e.preventDefault();
            openDir(parent);
        };

        filesDiv.appendChild(up);
        filesDiv.appendChild(document.createElement("br"));
        filesDiv.appendChild(document.createElement("br"));
    }

    data.forEach(file => {
        const a = document.createElement("a");

        a.href = "#";

        if (file.type === "dir") {
            a.textContent = file.name + "/";

            a.onclick = (e) => {
                e.preventDefault();
                openDir(file.path);
            };
        } else {
            a.textContent = file.name;

            a.onclick = (e) => {
                e.preventDefault();

                if (
                    file.name.endsWith(".png") ||
                    file.name.endsWith(".jpg") ||
                    file.name.endsWith(".jpeg") ||
                    file.name.endsWith(".gif") ||
                    file.name.endsWith(".webp") ||
                    file.name.endsWith(".html") ||
                    file.name.endsWith(".txt") ||
                    file.name.endsWith(".js") ||
                    file.name.endsWith(".json") ||
                    file.name.endsWith(".css")
                ) {
                    window.open(file.download_url, "_blank");
                } else {
                    window.location.href = file.download_url;
                }
            };
        }

        filesDiv.appendChild(a);
        filesDiv.appendChild(document.createElement("br"));
    });
}

openDir();
</script>

</body>
</html>
